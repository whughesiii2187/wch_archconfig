# -----------------------------------------------------
# Key bindings
# -----------------------------------------------------

# SUPER KEY
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"
$browser = $SCRIPTS/browser.sh
$filemanager = thunar
$SCRIPTS = ~/.config/hypr/scripts
$SETTINGS = ~/.config/hypr/settings

# Vim style bindings
unbind = SUPER, h
unbind = SUPER, j
unbind = SUPER, J
unbind = SUPER, k
unbind = SUPER, K
unbind = SUPER, l
unbind = SUPER, L

# Applications
bind = SUPER, RETURN, exec, $SETTINGS/terminal.sh # Open terminal
bind = SUPER SHIFT, B, exec, $browser # Open Zen browser
bind = SUPER SHIFT ALT, B, exec, $browser --private # Open Zen browser
bind = SUPER SHIFT, E, exec, $filemanager # Open the filemanager
bind = SUPER SHIFT, S, exec, spotify # Open Spotify Player
bind = SUPER, SPACE, exec, $SCRIPTS/launcher.sh # Open application launcher
bind = SUPER CTRL, E, exec, $SCRIPTS/launcher.sh -m symbols # emoji picker

# Actions
bind = SUPER CTRL, R, exec, hyprctl reload # Reload Hyprland configuration
bind = SUPER CTRL, Q, exec, $SCRIPTS/wlogout.sh # Start wlogout
bind = SUPER CTRL, K, exec, $SCRIPTS/keybindings.sh # Show keybindings
bind = SUPER CTRL, B, exec, pkill waybar && hyprctl dispatch exec waybar # Reload waybar
bind = SUPER CTRL, L, exec, hyprlock # Lock Screen
bind = SUPER, escape, exec, $SCRIPTS/menu.sh system # Power menu
bind = SUPER SHIFT CTRL, V, exec, $SCRIPTS/toggle_vpn.sh # Toggle VPN On/Off 

# Display
bind = SUPER SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Increase display zoom
bind = SUPER SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Decrease display zoom
bind = SUPER SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 # Reset display zoom
bind = SUPER, BACKSPACE, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle # Toggle Window Opacty

# Windows
# Close Windows
bind = SUPER, W, killactive # Kill active window
bind = SUPER SHIFT, W, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Quit active window and all open instances

# Tiling
bind = SUPER, P, pseudo, # Pseudo Window
bind = SUPER, T, togglefloating # Toggle active windows into floating mode
bind = SUPER SHIFT, F, fullscreen, 1 # Set active window to full width
bind = SUPER ALT, F, fullscreen, 0 # Set active window to fullscreen

# Move focus with SUPER + arrow
bind = SUPER, H, movefocus, l # Move focus left
bind = SUPER, J, movefocus, d # Move focus down
bind = SUPER, K, movefocus, u # Move focus up
bind = SUPER, L, movefocus, r # Move focus right

# Swap active window with one next to it with SUPER + SHIFT + arrow keys
bind = SUPER SHIFT, H, swapwindow, l # Swap tiled window left
bind = SUPER SHIFT, J, swapwindow, d # Swap tiled window down
bind = SUPER SHIFT, K, swapwindow, u # Swap tiled window up
bind = SUPER SHIFT, L, swapwindow, r # Swap tiled window right

# Move workspaces to other monitors
bind = SUPER ALT, H, movecurrentworkspacetomonitor, l # Move workspace to left monitor
bind = SUPER ALT, J, movecurrentworkspacetomonitor, d # Move workspace to up monitor
bind = SUPER ALT, K, movecurrentworkspacetomonitor, u # Move workspace to down monitor
bind = SUPER ALT, L, movecurrentworkspacetomonitor, r # Move workspace to right monitor

# Resize
bind = SUPER CTRL, right, resizeactive, 100 0 # Increase window width with keyboard
bind = SUPER CTRL, left, resizeactive, -100 0 # Reduce window width with keyboard
bind = SUPER CTRL, down, resizeactive, 0 100 # Increase window height with keyboard
bind = SUPER CTRL, up, resizeactive, 0 -100 # Reduce window height with keyboard

# Captures
bind = SUPER CTRL, 3, exec, $SCRIPTS/screenshot.sh smart clipboard # Screenshot fullscreen to clipboard
bind = SUPER CTRL, 4, exec, $SCRIPTS/screenshot.sh # Screenshot area with editing
bind = SUPER CTRL, 5, exec, $SCRIPTS/screenshot.sh fullscreen # Screenshot fullscreen to file
bind = SUPER CTRL, 6, exec, $SCRIPTS/screenrecord.sh # Screenrecording

# Copy / Paste
bind = SUPER, C, sendshortcut, CTRL, Insert, # Universal copy
bind = SUPER, V, sendshortcut, SHIFT, Insert, # Universal paste
bind = SUPER, X, sendshortcut, CTRL, X, # Universal cut
# bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# Move workspaces to other monitors
bind = SUPER SHIFT ALT, LEFT, movecurrentworkspacetomonitor, l # Move workspace to left monitor
bind = SUPER SHIFT ALT, RIGHT, movecurrentworkspacetomonitor, r # Move workspace to right monitor
bind = SUPER SHIFT ALT, UP, movecurrentworkspacetomonitor, u # Move workspace to up monitor
bind = SUPER SHIFT ALT, DOWN, movecurrentworkspacetomonitor, d # Move workspace to down monitor

# Switch workspaces with SUPER + [1-9; 0]
bind = SUPER, code:10, workspace, 1 # Switch to workspace 1 (Super + 1)
bind = SUPER, code:11, workspace, 2 # Switch to workspace 2 (Super + 2)
bind = SUPER, code:12, workspace, 3 # Switch to workspace 3 (Super + 3)
bind = SUPER, code:13, workspace, 4 # Switch to workspace 4 (Super + 4)
bind = SUPER, code:14, workspace, 5 # Switch to workspace 5 (Super + 5)
bind = SUPER, code:15, workspace, 6 # Switch to workspace 6 (Super + 6)
bind = SUPER, code:16, workspace, 7 # Switch to workspace 7 (Super + 7)
bind = SUPER, code:17, workspace, 8 # Switch to workspace 8 (Super + 8)
bind = SUPER, code:18, workspace, 9 # Switch to workspace 9 (Super + 9)
bind = SUPER, code:19, workspace, 10 # Switch to workspace 10 (Super + 10)

# Move active window to a workspace with SUPER + SHIFT + [1-9; 0]
bind = SUPER SHIFT, code:10, movetoworkspace, 1 # Move window to workspace 1
bind = SUPER SHIFT, code:11, movetoworkspace, 2 # Move window to workspace 2
bind = SUPER SHIFT, code:12, movetoworkspace, 3 # Move window to workspace 3
bind = SUPER SHIFT, code:13, movetoworkspace, 4 # Move window to workspace 4
bind = SUPER SHIFT, code:14, movetoworkspace, 5 # Move window to workspace 5
bind = SUPER SHIFT, code:15, movetoworkspace, 6 # Move window to workspace 6
bind = SUPER SHIFT, code:16, movetoworkspace, 7 # Move window to workspace 7
bind = SUPER SHIFT, code:17, movetoworkspace, 8 # Move window to workspace 8
bind = SUPER SHIFT, code:18, movetoworkspace, 9 # Move window to workspace 9
bind = SUPER SHIFT, code:19, movetoworkspace, 10 # Move window to workspace 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
bind = SUPER SHIFT ALT, code:10, movetoworkspacesilent, 1 # Move window silently to workspace 1
bind = SUPER SHIFT ALT, code:11, movetoworkspacesilent, 2 # Move window silently to workspace 2
bind = SUPER SHIFT ALT, code:12, movetoworkspacesilent, 3 # Move window silently to workspace 3
bind = SUPER SHIFT ALT, code:13, movetoworkspacesilent, 4 # Move window silently to workspace 4
bind = SUPER SHIFT ALT, code:14, movetoworkspacesilent, 5 # Move window silently to workspace 5
bind = SUPER SHIFT ALT, code:15, movetoworkspacesilent, 6 # Move window silently to workspace 6
bind = SUPER SHIFT ALT, code:16, movetoworkspacesilent, 7 # Move window silently to workspace 7
bind = SUPER SHIFT ALT, code:17, movetoworkspacesilent, 8 # Move window silently to workspace 8
bind = SUPER SHIFT ALT, code:18, movetoworkspacesilent, 9 # Move window silently to workspace 9
bind = SUPER SHIFT ALT, code:19, movetoworkspacesilent, 10 # Move window silently to workspace 10

# Control scratchpad
bind = SUPER, S, togglespecialworkspace, scratchpad # Toggle scratchpad
bind = SUPER ALT, S, movetoworkspacesilent, special:scratchpad # Move window to scratchpad

# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, $osdclient --input-volume mute-toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, $SCRIPTS/brightness.sh +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, $SCRIPTS/brightness.sh 5%-
# bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, omarchy-brightness-keyboard up
# bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, omarchy-brightness-keyboard down
# bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, omarchy-brightness-keyboard cycle

# Precise 1% multimedia adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, $SCRIPTS/brightness.sh +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, $SCRIPTS/brightness.sh 1%-

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = , XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Switch audio output with Super + Mute
# bindld = SUPER, XF86AudioMute, Switch audio output, exec, omarchy-cmd-audio-switch

# ~/.config/hyprdynamicmonitors/config.toml

[general]
destination = "$HOME/.config/hypr/monitors.conf"
debounce_time_ms = 1500

[lid_events]
# Uses D-Bus defaults — works on most systems with UPower installed

[power_events]
[power_events.dbus_query_object]
path = "/org/freedesktop/UPower/devices/line_power_ACAD"

[[power_events.dbus_signal_match_rules]]
object_path = "/org/freedesktop/UPower/devices/line_power_ACAD"

[notifications]
disabled = false
timeout_ms = 5000

# ─────────────────────────────────────────────────────────────
# PROFILE 1: All externals connected + lid OPEN
#   eDP-1 → ws 1 | DP-3 → ws 2 | DP-4 → ws 3 | DP-1 → ws 4,5
# ─────────────────────────────────────────────────────────────
[profiles.all_monitors_lid_open]
config_file = "hyprconfigs/all_monitors_lid_open.conf"
config_file_type = "static"
post_apply_exec = "bash ~/.config/hyprdynamicmonitors/scripts/ws-all-open.sh"

[profiles.all_monitors_lid_open.conditions]
lid_state = "Opened"

[[profiles.all_monitors_lid_open.conditions.required_monitors]]
name = "eDP-1"

[[profiles.all_monitors_lid_open.conditions.required_monitors]]
name = "DP-3"

[[profiles.all_monitors_lid_open.conditions.required_monitors]]
name = "DP-4"

[[profiles.all_monitors_lid_open.conditions.required_monitors]]
name = "DP-1"

# ─────────────────────────────────────────────────────────────
# PROFILE 2: All externals connected + lid CLOSED (clamshell)
#   DP-3 → ws 1,2 | DP-4 → ws 3 | DP-1 → ws 4,5
# ─────────────────────────────────────────────────────────────
[profiles.all_monitors_lid_closed]
config_file = "hyprconfigs/all_monitors_lid_closed.conf"
config_file_type = "static"
post_apply_exec = "bash ~/.config/hyprdynamicmonitors/scripts/ws-all-closed.sh"

[profiles.all_monitors_lid_closed.conditions]
lid_state = "Closed"

[[profiles.all_monitors_lid_closed.conditions.required_monitors]]
name = "eDP-1"

[[profiles.all_monitors_lid_closed.conditions.required_monitors]]
name = "DP-3"

[[profiles.all_monitors_lid_closed.conditions.required_monitors]]
name = "DP-4"

[[profiles.all_monitors_lid_closed.conditions.required_monitors]]
name = "DP-1"

# ─────────────────────────────────────────────────────────────
# PROFILE 3: Laptop only (no externals, lid open)
#   All workspaces → eDP-1
# ─────────────────────────────────────────────────────────────
[profiles.laptop_only]
config_file = "hyprconfigs/laptop_only.conf"
config_file_type = "static"
post_apply_exec = "bash ~/.config/hyprdynamicmonitors/scripts/ws-laptop-only.sh"

[profiles.laptop_only.conditions]
lid_state = "Opened"

[[profiles.laptop_only.conditions.required_monitors]]
name = "eDP-1"

# ─────────────────────────────────────────────────────────────
# FALLBACK: Catch-all for unexpected monitor combinations
# ─────────────────────────────────────────────────────────────
[fallback_profile]
config_file = "hyprconfigs/fallback.conf"
config_file_type = "static"

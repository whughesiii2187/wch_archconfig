# ── shell ──────────────────────────────────────────────────────────────────────
set -g default-shell /bin/zsh

# ── terminal ───────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── prefix ─────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── behaviour ──────────────────────────────────────────────────────────────────
set -g set-clipboard on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g mouse on
set -g status-interval 3
set -g allow-passthrough on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on

# ── reload ─────────────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── pane splits ────────────────────────────────────────────────────────────────
unbind %
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── pane resizing ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# ── pane navigate ──────────────────────────────────────────────────────────────
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ── copy mode ──────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── theme (inline Nord-style, no plugin required) ──────────────────────────────
nord0="#2E3440"
nord1="#3B4252"
nord4="#D8DEE9"
nord8="#88C0D0"
nord9="#81A1C1"
nord14="#A3BE8C"

set -g status-position top
set -g status-style "fg=${nord4},bg=${nord0}"
set -g status-left-length 100
set -g status-left "#[fg=${nord14},bold] #S #[fg=${nord4},nobold] | "
set -g status-right "#[fg=${nord9}] %H:%M "

set -g window-status-current-format "#[fg=${nord8},bold] #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format " #I:#W"

set -g message-style "fg=${nord4},bg=${nord0}"
set -g mode-style "fg=${nord1},bg=${nord9}"
set -g pane-border-style "fg=${nord1}"
set -g pane-active-border-style "fg=${nord14}"

# ── plugins ────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'

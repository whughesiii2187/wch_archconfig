# ── shell ──────────────────────────────────────────────────────────────────────
set -g default-shell /bin/zsh

# ── terminal ───────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── prefix ─────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-b
bind C-s send-prefix

# ── passthrough to inner tmux ──────────────────────────────────────────────────
# C-s a sends C-a into the focused pane (reaches the container's tmux)
bind a send-keys C-a

# ── behaviour ──────────────────────────────────────────────────────────────────
set -g set-clipboard on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g mouse on
set -g status-interval 3
set -g allow-passthrough on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on

# ── reload ─────────────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── pane splits ────────────────────────────────────────────────────────────────
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── pane resizing ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# ── copy mode ──────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── plugins ────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'arcticicestudio/nord-tmux'

set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

# Shortcut for sync panes like iTerm2
bind C-x set-window-option synchronize-panes\; display-message "synchronize-panes is now #\{?pane\_synchronized,on,off}"
set-option -g status-position top

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
